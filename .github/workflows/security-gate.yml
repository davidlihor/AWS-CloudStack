name: Security-Gate

on:
  push:
    branches: 
      - '**'
  pull_request:
    branches: 
      - '**'

jobs:
  leak-detection:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Gitleaks
        uses: ./.github/actions/setup-gitleaks
        with:
          version: "8.20.1"

      - name: Run Gitleaks (Full Scan)
        shell: bash
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0 \
            --no-git

          if [ -f gitleaks-report.json ] && [ s$(cat gitleaks-report.json) != "s[]" ]; then
            echo "❌ Gitleaks found potential leaks!"
            cat gitleaks-report.json | jq '.[] | {RuleID, File, StartLine}'
            exit 1
          else
            echo "✅ No leaks found"
          fi
