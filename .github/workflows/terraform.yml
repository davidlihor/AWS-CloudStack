name: Terraform CI/CD
on:
  push:
    branches:
      - main
    paths: 
      - terraform/**
  pull_request:
    branches:
      - main
    paths: 
      - terraform/**
  workflow_dispatch:
  workflow_run:
    workflows: 
      - "Frontend Build"
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  TF_VERSION: 1.13.3
permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform

  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
          output_format: sarif
          output_file_path: ${{ github.workspace }}/terraform/checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report-terraform
          path: terraform/checkov-results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terraform/checkov-results.sarif

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: config
          scan-ref: ./terraform
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          security-checks: config
 
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: 
      - validate
      - security-scan
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download frontend build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: frontend.yml
          workflow_conclusion: success
          name: frontend-dist
          path: frontend/dist
          if_no_artifact_found: fail

      - name: Terraform Init (remote S3)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out tfplan
        working-directory: terraform

      - name: Save Plan Output
        if: ${{ steps.plan.outcome == 'success' }}
        run: |
          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan.txt
          else
            echo "tfplan missing" >&2
            exit 1
          fi
        working-directory: terraform

      - name: Upload Plan as Artifact
        if: ${{ steps.plan.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-terraform
          path: |
            terraform/plan.txt
            terraform/tfplan
          retention-days: 14

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    needs: 
      - security-scan
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Download frontend build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: frontend.yml
          workflow_conclusion: success
          name: frontend-dist
          path: frontend/dist
          if_no_artifact_found: fail

      - name: Terraform Init (remote S3)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.BUCKET_TF_STATE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -parallelism=1
        working-directory: terraform